<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Movie Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-film"></i>
                <h1>Movie Recommender</h1>
                <p>Войдите, чтобы получить персональные рекомендации</p>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="user-select" class="form-label">
                        <i class="fas fa-user"></i> Выберите пользователя
                    </label>
                    <select id="user-select" class="form-select" required>
                        <option value="">Загрузка пользователей...</option>
                    </select>
                </div>

                <button type="submit" class="btn-login" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>

                <div class="loading-spinner" id="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p class="mt-2 text-secondary">Вход в систему...</p>
                </div>
            </form>

            <div id="error-message" style="display: none;" class="alert alert-danger">
                <i class="fas fa-exclamation-triangle"></i> <span id="error-text"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
